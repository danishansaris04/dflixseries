<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFlix Admin Pro - Auto Magic</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --red: #e50914;
            --dark-bg: #050505;
            --card-bg: #121212;
            --input-bg: #1e1e1e;
            --border: #2b2b2b;
            --text: #ffffff;
            --green: #2ecc71;
        }

        * { box-sizing: border-box; transition: 0.3s; }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .admin-container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
        }

        h1 {
            color: var(--red);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-size: 28px;
        }

        .import-section {
            background: #181818;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 25px;
            border: 1px dashed #444;
        }

        textarea {
            width: 100%;
            background: #000;
            color: var(--green);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            height: 90px;
            resize: none;
            outline: none;
        }

        .season-block {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }

        .season-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }

        .season-name {
            background: transparent;
            border: none;
            color: var(--red);
            font-size: 20px;
            font-weight: 700;
            width: 100px;
            outline: none;
        }

        .episode-row {
            display: grid;
            grid-template-columns: 70px 1fr 45px;
            gap: 10px;
            margin-bottom: 10px;
            align-items: center;
            background: #222;
            padding: 8px;
            border-radius: 10px;
        }

        input {
            background: var(--input-bg);
            border: 1px solid #333;
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
        }

        .btn {
            cursor: pointer;
            border: none;
            font-weight: 600;
            border-radius: 8px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-import {
            background: transparent;
            color: #fff;
            border: 1px solid var(--red);
            width: 100%;
            padding: 12px;
            margin-top: 10px;
        }

        .btn-import:hover { background: var(--red); }

        .btn-add-ep {
            background: #333;
            color: #fff;
            padding: 10px;
            width: 100%;
            margin-top: 5px;
        }

        .btn-add-season {
            background: #0056b3;
            color: #fff;
            padding: 15px;
            margin-bottom: 15px;
            width: 100%;
        }

        .btn-del {
            background: #441111;
            color: #ff9999;
            height: 40px;
            width: 40px;
        }

        .btn-generate {
            background: var(--red);
            color: #fff;
            padding: 18px;
            width: 100%;
            font-size: 18px;
            margin-top: 10px;
        }

        #resultArea {
            margin-top: 30px;
            display: none;
            background: #000;
            border: 1px solid var(--red);
            padding: 20px;
            border-radius: 15px;
        }

        #finalUrlDisplay {
            word-break: break-all;
            font-family: monospace;
            color: var(--green);
            font-size: 12px;
            display: block;
            margin-bottom: 20px;
            padding: 15px;
            background: #080808;
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        @media (max-width: 600px) {
            .episode-row { grid-template-columns: 60px 1fr; }
            .btn-del-row { grid-column: span 2; width: 100%; height: 35px; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>DFlix Admin Pro</h1>

    <div class="import-section">
        <textarea id="importUrl" placeholder="Paste Existing Index URL here..."></textarea>
        <button class="btn btn-import" onclick="importOldUrl()">Load Existing Data</button>
    </div>
    
    <div id="masterContainer"></div>

    <button class="btn btn-add-season" onclick="addNewSeason()">+ Add New Season Block</button>
    <button class="btn btn-generate" onclick="buildFinalUrl()">Generate Final Index Link</button>

    <div id="resultArea">
        <span id="finalUrlDisplay"></span>
        <button class="btn btn-generate" style="font-size: 14px;" onclick="copyToClipboard()">Copy to Clipboard</button>
    </div>
</div>

<script>
    function addNewSeason(name = "") {
        // Auto Season Logic
        const existingSeasons = document.querySelectorAll('.season-block').length;
        const sName = name || `S${existingSeasons + 1}`;
        
        const container = document.getElementById('masterContainer');
        const sId = `season-block-${Date.now()}`;
        
        container.insertAdjacentHTML('beforeend', `
            <div class="season-block" id="${sId}">
                <div class="season-header">
                    <input type="text" class="season-name" value="${sName}">
                    <button class="btn btn-del" onclick="document.getElementById('${sId}').remove()">✕</button>
                </div>
                <div class="ep-list"></div>
                <button class="btn btn-add-ep" onclick="addEpisodeRow('${sId}')">+ Add Episode</button>
            </div>`);
        return sId;
    }

    function addEpisodeRow(sId, range = "", link = "") {
        const list = document.querySelector(`#${sId} .ep-list`);
        
        // Auto Episode Number Logic
        let nextEp = range;
        if (nextEp === "") {
            const lastEpInput = list.querySelector('.episode-row:last-child .range');
            if (lastEpInput) {
                nextEp = parseInt(lastEpInput.value) + 1;
            } else {
                nextEp = 1;
            }
        }

        const rowId = 'row-' + Math.random().toString(36).substr(2, 5);
        list.insertAdjacentHTML('beforeend', `
            <div class="episode-row" id="${rowId}">
                <input type="text" class="range" placeholder="No." value="${nextEp}">
                <input type="text" class="link" placeholder="Dropbox Link" value="${link}">
                <button class="btn btn-del btn-del-row" onclick="document.getElementById('${rowId}').remove()">✕</button>
            </div>`);
    }

    function importOldUrl() {
        const rawUrl = document.getElementById('importUrl').value.trim();
        if (!rawUrl.includes('?ids=')) return alert("Invalid URL!");

        document.getElementById('masterContainer').innerHTML = "";
        const idsPart = decodeURIComponent(rawUrl.split('?ids=')[1]);
        const seasonChunks = idsPart.split(/,(?=S\d)/);
        
        seasonChunks.forEach(chunk => {
            const sName = (chunk.match(/^S\d+/) || ["S1"])[0];
            const sId = addNewSeason(sName);
            const epRegex = /\((\d+)\),\(([\s\S]+?)\)/g;
            let m;
            while ((m = epRegex.exec(chunk)) !== null) {
                addEpisodeRow(sId, m[1], "https://www.dropbox.com/scl/fi/" + m[2]);
            }
        });
        alert("Data Loaded!");
    }

    function buildFinalUrl() {
        let finalParts = [];
        document.querySelectorAll('.season-block').forEach(s => {
            finalParts.push(s.querySelector('.season-name').value.trim());
            s.querySelectorAll('.episode-row').forEach(row => {
                const n = row.querySelector('.range').value.trim();
                let l = row.querySelector('.link').value.trim();
                if (n && l) {
                    if (l.includes('/fi/')) l = l.split('/fi/')[1];
                    l = l.replace(/[?&]dl=0/g, "");
                    finalParts.push(`(${n})`, `(${l})`);
                }
            });
        });
        document.getElementById('finalUrlDisplay').innerText = "https://dflixseries.netlify.app/?ids=" + finalParts.join(',');
        document.getElementById('resultArea').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function copyToClipboard() {
        navigator.clipboard.writeText(document.getElementById('finalUrlDisplay').innerText);
        alert("Link Copied!");
    }
</script>
</body>
</html>
