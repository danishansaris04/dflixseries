<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFlix Admin - Multi-Season Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e50914; --dark-bg: #0a0a0a; --card-bg: #141414; --input-bg: #2a2a2a; }
        body { font-family: 'Poppins', sans-serif; background: var(--dark-bg); color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .admin-container { width: 100%; max-width: 800px; background: var(--card-bg); padding: 40px; border-radius: 15px; border: 1px solid #333; box-shadow: 0 10px 50px rgba(0,0,0,0.7); }
        
        h1 { color: var(--red); text-align: center; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 40px; font-weight: 700; }
        
        .season-block { background: #1a1a1a; padding: 25px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #333; position: relative; transition: 0.3s; }
        .season-block:hover { border-color: var(--red); }
        
        .season-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .season-title-input { background: transparent; border: none; color: var(--red); font-size: 20px; font-weight: 700; width: 80px; outline: none; }
        
        .episode-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: center; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        
        input { background: var(--input-bg); border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; outline: none; transition: 0.2s; font-size: 14px; }
        input:focus { border-color: var(--red); background: #333; }
        input.range { width: 90px; flex: none; text-align: center; font-weight: bold; }
        input.link { flex: 1; }

        .btn { cursor: pointer; border: none; font-weight: 600; border-radius: 6px; transition: 0.2s; text-transform: uppercase; }
        .btn-add-ep { background: #333; color: #fff; padding: 8px 15px; font-size: 11px; }
        .btn-add-ep:hover { background: #444; }
        
        .btn-del { background: transparent; color: #666; font-size: 18px; padding: 0 10px; }
        .btn-del:hover { color: var(--red); }
        
        .controls { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .btn-add-season { background: transparent; color: #fff; border: 2px dashed #444; padding: 15px; font-size: 16px; }
        .btn-add-season:hover { border-color: var(--red); color: var(--red); }
        
        .btn-generate { background: var(--red); color: #fff; padding: 18px; font-size: 18px; letter-spacing: 1px; box-shadow: 0 5px 20px rgba(229, 9, 20, 0.4); }
        .btn-generate:hover { transform: translateY(-2px); background: #ff101a; }

        #resultArea { margin-top: 35px; display: none; background: #050505; border: 1px solid var(--red); padding: 25px; border-radius: 10px; }
        .result-url { word-break: break-all; font-family: 'Courier New', monospace; color: #00ff00; font-size: 13px; margin-bottom: 20px; display: block; line-height: 1.6; }
        
        .copy-info { font-size: 11px; color: #666; text-align: center; display: block; margin-top: 10px; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>DFlix Admin Pro</h1>
    
    <div id="masterContainer">
        <div class="season-block" id="season-1">
            <div class="season-header">
                <input type="text" class="season-name" value="S1">
                <button class="btn btn-del" onclick="removeBlock('season-1')" title="Delete Season">×</button>
            </div>
            <div class="ep-list">
                <div class="episode-row" id="s1-ep1">
                    <input type="text" class="range" placeholder="Range">
                    <input type="text" class="link" placeholder="Paste Full Dropbox Link Here">
                    <button class="btn btn-del" onclick="removeBlock('s1-ep1')" title="Remove Row">×</button>
                </div>
            </div>
            <button class="btn btn-add-ep" onclick="addEpisodeRow(1)">+ Add Episode Range</button>
        </div>
    </div>

    <div class="controls">
        <button class="btn btn-add-season" onclick="addNewSeason()">+ Add New Season Block</button>
        <button class="btn btn-generate" onclick="buildFinalUrl()">Build Final Index URL</button>
    </div>

    <div id="resultArea">
        <label style="color: var(--red); font-size: 12px; font-weight: bold; text-transform: uppercase;">Generated Link:</label>
        <span class="result-url" id="finalUrlDisplay"></span>
        <button class="btn btn-generate" style="font-size: 14px; padding: 12px;" onclick="copyToClipboard()">Copy Result URL</button>
        <span class="copy-info">Click the button to copy the link for your Netlify Index page.</span>
    </div>
</div>

<script>
    let sIdx = 1;
    let epIdx = 1;

    function addNewSeason() {
        sIdx++;
        const container = document.getElementById('masterContainer');
        const html = `
            <div class="season-block" id="season-${sIdx}">
                <div class="season-header">
                    <input type="text" class="season-name" value="S${sIdx}">
                    <button class="btn btn-del" onclick="removeBlock('season-${sIdx}')">×</button>
                </div>
                <div class="ep-list">
                    <div class="episode-row" id="s${sIdx}-ep${++epIdx}">
                        <input type="text" class="range" placeholder="Range">
                        <input type="text" class="link" placeholder="Link">
                        <button class="btn btn-del" onclick="removeBlock('s${sIdx}-ep${epIdx}')">×</button>
                    </div>
                </div>
                <button class="btn btn-add-ep" onclick="addEpisodeRow(${sIdx})">+ Add Episode Range</button>
            </div>`;
        container.insertAdjacentHTML('beforeend', html);
    }

    function addEpisodeRow(id) {
        const list = document.querySelector(`#season-${id} .ep-list`);
        const rowId = `s${id}-ep${++epIdx}`;
        const html = `
            <div class="episode-row" id="${rowId}">
                <input type="text" class="range" placeholder="Range">
                <input type="text" class="link" placeholder="Link">
                <button class="btn btn-del" onclick="removeBlock('${rowId}')">×</button>
            </div>`;
        list.insertAdjacentHTML('beforeend', html);
    }

    function removeBlock(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    }

    function cleanDropboxPath(url) {
        if (!url.includes('dropbox.com')) return url.trim();
        // Dropbox link se fi/ ke baad ka pura path (with rlkey, st etc.) nikalne ke liye
        const match = url.match(/\/fi\/(.+)$/i);
        if (match) {
            return match[1].split('?dl=0')[0].split('&dl=0')[0];
        }
        return url.trim();
    }

    function buildFinalUrl() {
        const baseUrl = "https://dflixseries.netlify.app/?ids=";
        let parts = [];

        document.querySelectorAll('.season-block').forEach(s => {
            const sTitle = s.querySelector('.season-name').value.trim();
            parts.push(sTitle);

            s.querySelectorAll('.episode-row').forEach(row => {
                const range = row.querySelector('.range').value.trim();
                const rawLink = row.querySelector('.link').value.trim();

                if (range && rawLink) {
                    const shortPath = cleanDropboxPath(rawLink);
                    parts.push(`(${range})`, shortPath);
                }
            });
        });

        if (parts.length <= 1) {
            alert("Please add at least one season and episode link!");
            return;
        }

        const fullUrl = baseUrl + parts.join(',');
        document.getElementById('finalUrlDisplay').innerText = fullUrl;
        document.getElementById('resultArea').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }

    function copyToClipboard() {
        const text = document.getElementById('finalUrlDisplay').innerText;
        navigator.clipboard.writeText(text).then(() => alert("URL Copied to Clipboard!"));
    }
</script>

</body>
</html>
