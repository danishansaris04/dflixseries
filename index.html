<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFLIXSERIES - Watch Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e50914; --bg: #050505; --card: #161616; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; text-align: center; }
        .logo { color: var(--red); font-size: 35px; font-weight: 700; text-transform: uppercase; margin-bottom: 30px; letter-spacing: 2px; }
        .season-title { max-width: 900px; margin: 40px auto 15px; padding: 15px 20px; border-left: 5px solid var(--red); font-size: 20px; font-weight: 700; background: #111; text-align: left; text-transform: uppercase; border-radius: 0 8px 8px 0; }
        .ep-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; max-width: 900px; margin: 0 auto 30px; }
        .ep-link { background: var(--card); border: 1px solid #222; padding: 20px 10px; border-radius: 12px; text-decoration: none; color: white; transition: 0.3s; display: block; }
        .ep-link:hover { background: var(--red); transform: translateY(-5px); border-color: #fff; box-shadow: 0 8px 20px rgba(229, 9, 20, 0.4); }
        .ep-link.active { border-color: var(--red); background: rgba(229, 9, 20, 0.2); box-shadow: inset 0 0 10px rgba(229, 9, 20, 0.5); }
        .ep-text { font-size: 16px; font-weight: 700; display: block; }
        .ep-sub { display: block; font-size: 10px; opacity: 0.6; margin-top: 8px; text-transform: uppercase; color: #ff9999; }
    </style>
</head>
<body>
    <div class="logo">DFLIXSERIES</div>
    <div id="mainContainer"></div>

    <script>
        const container = document.getElementById('mainContainer');
        const params = new URLSearchParams(window.location.search);
        const ids = params.get('ids');

        if (ids) {
            const chunks = ids.split(/,(?=S\d+)/);
            chunks.forEach(chunk => {
                const sMatch = chunk.match(/^(S\d+)/);
                if (!sMatch) return;

                const h = document.createElement('div');
                h.className = 'season-title';
                h.innerText = sMatch[0].replace('S', 'SEASON ');
                container.appendChild(h);

                const grid = document.createElement('div');
                grid.className = 'ep-grid';
                container.appendChild(grid);

                const epRegex = /\((\d+)\),\(([^)]+)\),\(([^)]+)\)/g;
                let m;
                while ((m = epRegex.exec(chunk)) !== null) {
                    const epNo = m[1];
                    const epTxt = m[2];
                    let epKey = m[3].trim();

                    // --- THE FIX ---
                    // 1. Remove any leading slashes or https if the user accidentally pasted them
                    let cleanPath = epKey.replace(/^https?:\/\//, '').replace('www.dropbox.com/scl/fi/', '');
                    
                    // 2. Build correctly formatted Dropbox Path
                    let finalDropboxUrl = `www.dropbox.com/scl/fi/${cleanPath}`;
                    
                    // 3. Add raw=1 correctly (check if ? already exists in the key)
                    finalDropboxUrl += finalDropboxUrl.includes('?') ? '&raw=1' : '?raw=1';

                    // 4. Intent URL Construction (WITHOUT leading https:// after intent://)
                    const videoTitle = encodeURIComponent(`EP ${epNo} - ${epTxt}`);
                    const intent = `intent://${finalDropboxUrl}#Intent;scheme=https;type=video/*;package=com.kieling.whitescreen;S.title=${videoTitle};B.force_no_download=true;end`;

                    const a = document.createElement('a');
                    a.href = intent;
                    a.className = "ep-link";
                    a.onclick = function() {
                        document.querySelectorAll('.ep-link').forEach(el => el.classList.remove('active'));
                        this.classList.add('active');
                    };
                    a.innerHTML = `<span class="ep-text">EP ${epNo}</span><span class="ep-sub">${epTxt}</span>`;
                    grid.appendChild(a);
                }
            });
        } else {
            container.innerHTML = "<p style='margin-top:50px; opacity:0.5;'>URL does not contain any episode data.</p>";
        }
    </script>
</body>
</html>
