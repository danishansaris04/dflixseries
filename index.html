<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFlix Series - Episode Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e50914; --bg: #050505; --card: #161616; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; text-align: center; }
        .logo { color: var(--red); font-size: 35px; font-weight: 700; text-transform: uppercase; margin-bottom: 30px; }
        
        .season-title {
            max-width: 900px; margin: 20px auto 15px;
            padding: 15px 20px; border-left: 5px solid var(--red);
            font-size: 20px; font-weight: 700; background: #111; text-align: left;
            text-transform: uppercase; border-radius: 0 8px 8px 0;
        }

        .ep-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 15px; max-width: 900px; margin: 0 auto 30px;
        }

        .ep-link {
            background: var(--card); border: 1px solid #222;
            padding: 20px 10px; border-radius: 12px;
            text-decoration: none; color: white;
            transition: 0.3s; display: block;
        }

        .ep-link:hover {
            background: var(--red); transform: translateY(-5px);
            border-color: #fff; box-shadow: 0 8px 20px rgba(229, 9, 20, 0.4);
        }

        .ep-text { font-size: 16px; font-weight: 700; display: block; }
        .ep-sub { display: block; font-size: 10px; opacity: 0.5; margin-top: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="mainContent">
        <div class="logo">DFLIXSERIES</div>
        <div id="mainContainer"></div>
    </div>

    <script>
        const mainContainer = document.getElementById('mainContainer');
        const fullQuery = window.location.search;

        if (fullQuery.includes('ids=')) {
            // Poore string ko decode karein bina kisi cut ke
            const idsContent = decodeURIComponent(fullQuery.split('ids=')[1]);

            // Season Header (Sirf ek baar)
            const h = document.createElement('div');
            h.className = 'season-title';
            h.innerText = "SEASON 1";
            mainContainer.appendChild(h);

            const grid = document.createElement('div');
            grid.className = 'ep-grid';
            mainContainer.appendChild(grid);

            // UPDATED REGEX:
            // Yeh (number) ke baad ka sab kuch lega jab tak agla (number) ya S1 na aa jaye
            const epRegex = /\((\d+)\),([\s\S]+?)(?=(?:\s*,\s*\(\d+\)|$|S\d+))/g;
            let match;

            while ((match = epRegex.exec(idsContent)) !== null) {
                const epNum = match[1];
                let epFullLink = match[2].trim();

                // Link ke end mein agar split comma reh gaya ho toh hatao
                if (epFullLink.endsWith(',')) epFullLink = epFullLink.slice(0, -1);

                // --- DROPBOX STREAMING FIX ---
                // Agar link mein '?' hai (jo ki rlkey ke liye hai), toh hum '&raw=1' add karenge
                // Taki Dropbox direct stream serve kare
                let streamingUrl = epFullLink.includes('?') ? 
                                   `${epFullLink}&raw=1` : 
                                   `${epFullLink}?raw=1`;

                // Intent format for White Screen / MX Player
                const intentUrl = `intent://www.dropbox.com/scl/fi/${streamingUrl}#Intent;scheme=https;type=video/*;package=com.kieling.whitescreen;S.title=DFlix%20Streaming;B.force_no_download=true;end`;

                const btn = document.createElement('a');
                btn.href = intentUrl;
                btn.className = "ep-link";
                btn.innerHTML = `<span class="ep-text">EP ${epNum}</span><span class="ep-sub">PLAY VIDEO</span>`;
                grid.appendChild(btn);
            }
        } else {
            mainContainer.innerHTML = "No Episodes Found.";
        }
    </script>
</body>
</html>
