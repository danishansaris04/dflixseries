<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFlix Series - Episode Index</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --red: #e50914; --bg: #050505; --card: #161616; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: white; margin: 0; padding: 20px; text-align: center; }
        .logo { color: var(--red); font-size: 35px; font-weight: 700; text-transform: uppercase; margin-bottom: 30px; }
        
        #access-denied { display: none; margin-top: 100px; }
        .error-btn { background: var(--red); color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px; display: inline-block; margin-top: 20px; font-weight: bold; }

        .season-title {
            max-width: 900px; margin: 30px auto 15px;
            padding: 15px 20px; border-left: 5px solid var(--red);
            font-size: 20px; font-weight: 700; background: #111; text-align: left;
            text-transform: uppercase; border-radius: 0 8px 8px 0;
        }

        .ep-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px; max-width: 900px; margin: 0 auto 30px;
        }

        .ep-link {
            background: var(--card); border: 1px solid #222;
            padding: 20px 10px; border-radius: 12px;
            text-decoration: none; color: white;
            transition: 0.3s; display: block;
        }

        .ep-link:hover {
            background: var(--red); transform: translateY(-5px);
            border-color: #fff; box-shadow: 0 8px 20px rgba(229, 9, 20, 0.4);
        }

        .ep-text { font-size: 16px; font-weight: 700; display: block; }
        .ep-sub { display: block; font-size: 10px; opacity: 0.5; margin-top: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="mainContent">
        <div class="logo">DFLIXSERIES</div>
        <div id="mainContainer"></div>
    </div>

    <div id="access-denied">
        <h1>🚫 Access Denied</h1>
        <p>Please access from the official website.</p>
        <a href="https://dflixmovie.netlify.app" class="error-btn">Go to DFlix Movie</a>
    </div>

    <script>
        const mainContainer = document.getElementById('mainContainer');
        const params = new URLSearchParams(window.location.search);
        const idsRaw = params.get('ids');

        if (idsRaw) {
            // 1. Pehle Seasons ko split karo (S1, S2...)
            const seasonParts = idsRaw.split(/,(?=S\d)/i);

            seasonParts.forEach(part => {
                let cleanPart = part.trim();
                
                // Season Header lagao
                if (cleanPart.startsWith('S')) {
                    const seasonNum = cleanPart.match(/^S(\d+)/i)[1];
                    const h = document.createElement('div');
                    h.className = 'season-title';
                    h.innerText = "SEASON " + seasonNum;
                    mainContainer.appendChild(h);
                    // S1, hata do taaki sirf episodes bachein
                    cleanPart = cleanPart.replace(/^S\d+,?/, '');
                }

                const grid = document.createElement('div');
                grid.className = 'ep-grid';
                mainContainer.appendChild(grid);

                // 2. EPISODE EXTRACTOR (Magic Regex)
                // Yeh dhoondhega "(Number)," aur uske baad ka poora link jab tak naya bracket na aaye
                const epRegex = /\((\d+)\),([\s\S]+?)(?=\s*,\s*\(\d+\)|$)/g;
                let match;

                while ((match = epRegex.exec(cleanPart)) !== null) {
                    const epNum = match[1];
                    const epId = match[2].trim();

                    // Link build karo
                    const intentUrl = `intent://www.dropbox.com/scl/fi/${epId}&raw=1#Intent;scheme=https;type=video/*;package=com.kieling.whitescreen;S.title=DFlix%20Streaming;B.force_no_download=true;end`;

                    const btn = document.createElement('a');
                    btn.href = intentUrl;
                    btn.className = "ep-link";
                    btn.innerHTML = `<span class="ep-text">EP ${epNum}</span><span class="ep-sub">PLAY IN APP</span>`;
                    grid.appendChild(btn);
                }
            });
        } else {
            mainContainer.innerHTML = "No episodes found in URL.";
        }
    </script>
</body>
</html>
